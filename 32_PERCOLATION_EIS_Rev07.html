<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyquist Plot Analyzer - 비교 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .multi-upload-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .multi-upload-label {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .multi-upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .multi-upload-info {
            margin-top: 10px;
            font-size: 12px;
            color: #7f8c8d;
        }

        input[type="file"] {
            display: none;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .upload-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .upload-item.loaded {
            border-color: #27ae60;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
        }

        .upload-item.not-loaded {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .upload-number {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
            min-width: 30px;
        }

        .color-indicator {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-indicator:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .file-input-wrapper {
            flex: 1;
        }

        .file-input-label {
            display: block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .file-input-label.loaded {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .analyze-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        .analyze-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .comparison-section {
            background: white;
        }

        .comparison-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .data-selector {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .data-selector input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .data-selector label {
            flex: 1;
            font-weight: 600;
            cursor: pointer;
        }

        .data-options {
            display: flex;
            gap: 10px;
        }

        .option-btn {
            padding: 6px 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .option-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
        }

        .reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #c0392b;
        }

        .capture-btn {
            background: transparent;
            color: #666;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .capture-btn:hover {
            transform: scale(1.15);
            color: #333;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .result-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result-table {
            width: 100%;
            font-size: 12px;
        }

        .result-table td {
            padding: 5px;
        }

        .result-table td:first-child {
            color: #7f8c8d;
        }

        .result-table td:last-child {
            font-weight: 600;
            text-align: right;
        }

        .color-picker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .color-picker-modal.active {
            display: flex;
        }

        .color-picker-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .color-picker-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .color-group-label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
        }

        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option:hover {
            transform: scale(1.1);
            border-color: #333;
        }

        .color-option.selected {
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
        }

        .color-picker-close {
            display: block;
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        /* ========== 요약 테이블 스타일 ========== */
        .summary-table-container {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #667eea;
            display: none;
        }

        .summary-table-container.active {
            display: block;
        }

        .summary-table-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .summary-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 8px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #ddd;
        }

        .summary-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #ddd;
            background: white;
        }

        .summary-table td .r-value {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .summary-table td .r-value:hover {
            background: #fff3cd;
            border: 1px dashed #ffc107;
            cursor: pointer;
        }

        .summary-table td .r-value::after {
            content: ' ✏️';
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .summary-table td .r-value:hover::after {
            opacity: 1;
        }

        .summary-table td .r-input {
            border: 2px solid #667eea;
            border-radius: 4px;
            text-align: center;
        }

        .summary-table tr:nth-child(even) td {
            background: #f8f9fa;
        }

        .summary-table tr:hover td {
            background: #e3f2fd;
        }

        .group-header {
            background: #e3f2fd !important;
            font-weight: 700;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Nyquist Plot Analyzer</h1>
        <div class="subtitle">EIS 데이터 비교 분석 시스템</div>

        <div class="main-layout">
            <!-- 왼쪽: 파일 업로드 및 개별 분석 -->
            <div class="section">
                <div class="section-title">📁 파일 업로드 (최대 12개)</div>
                
                <div class="multi-upload-section">
                    <input type="file" id="multiFileInput" accept=".txt,.csv" multiple onchange="handleMultiFileSelect(this)">
                    <label for="multiFileInput" class="multi-upload-label">📂 파일 선택 (여러 개)</label>
                    <div class="multi-upload-info">최대 12개 파일을 동시에 선택할 수 있습니다</div>
                </div>

                <div class="upload-grid" id="uploadGrid">
                    <!-- 업로드된 파일들이 여기에 4x2 그리드로 표시됩니다 -->
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button class="analyze-btn" onclick="saveProject()" style="flex: 1; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">💾 프로젝트 저장</button>
                    <button class="analyze-btn" onclick="document.getElementById('projectFileInput').click()" style="flex: 1; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">📂 프로젝트 불러오기</button>
                    <input type="file" id="projectFileInput" accept=".json" style="display:none" onchange="loadProject(event)">
                </div>
                
                <button class="analyze-btn" onclick="analyzeAll()" id="analyzeBtn" disabled>분석 시작</button>
                <div class="loading" id="loading">분석 중입니다...</div>

                <div class="results-grid" id="resultsGrid" style="display: none;">
                    <!-- 결과 카드들이 여기 표시됩니다 -->
                </div>

                <!-- 요약 테이블 -->
                <div class="summary-table-container" id="summaryTableContainer">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <div class="summary-table-title">📊 분석 요약 (R & σ)</div>
                        <button onclick="exportSummaryCSV()" style="padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 14px;">
                            💾 CSV 저장
                        </button>
                    </div>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>샘플</th>
                                <th>농도<br>(wt%)</th>
                                <th>R (Ω)</th>
                                <th>Rs (Ω)</th>
                                <th>Rct (Ω)</th>
                                <th>σ (S/cm)</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                            <!-- 데이터가 여기에 표시됩니다 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 오른쪽: 비교 그래프 및 Percolation Curve -->
            <div class="section comparison-section">
                <div class="section-title">📊 비교 분석</div>
                
                <div class="comparison-controls" id="comparisonControls">
                    <!-- 체크박스들이 여기 표시됩니다 -->
                </div>

                <div class="chart-container">
                    <div class="chart-header">
                        <div class="chart-title">Nyquist Plot 비교</div>
                        <div class="chart-controls" style="display: flex; align-items: center; gap: 10px;">
                            <label style="font-size: 13px; font-weight: 600;">스케일:</label>
                            <select id="xScaleSelect" onchange="changeComparisonScale()" style="padding: 6px 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; cursor: pointer;">
                                <option value="linear">Linear</option>
                                <option value="logarithmic">Log</option>
                            </select>
                            <button class="reset-btn" onclick="resetComparisonZoom()">🔄 리셋</button>
                            <button class="capture-btn" onclick="captureComparison()">📷</button>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="comparisonChart"></canvas>
                    </div>
                </div>

                <div class="chart-container" style="margin-top: 30px;">
                    <div class="chart-header">
                        <div class="chart-title">Percolation Curve</div>
                        <div class="chart-controls">
                            <button class="reset-btn" onclick="resetPercolationZoom()">🔄 리셋</button>
                            <button class="capture-btn" onclick="capturePercolation()">📷</button>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="percolationChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 색상 선택 모달 -->
    <div class="color-picker-modal" id="colorPickerModal">
        <div class="color-picker-content">
            <div class="color-picker-title">색상 선택</div>
            <div class="color-grid">
                <div class="color-group">
                    <div class="color-group-label">검정</div>
                    <div class="color-option" style="background: #000000" data-color="#000000"></div>
                    <div class="color-option" style="background: #333333" data-color="#333333"></div>
                    <div class="color-option" style="background: #666666" data-color="#666666"></div>
                    <div class="color-option" style="background: #999999" data-color="#999999"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">빨강</div>
                    <div class="color-option" style="background: #ff0000" data-color="#ff0000"></div>
                    <div class="color-option" style="background: #cc0000" data-color="#cc0000"></div>
                    <div class="color-option" style="background: #ff6b6b" data-color="#ff6b6b"></div>
                    <div class="color-option" style="background: #ff3333" data-color="#ff3333"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">파랑</div>
                    <div class="color-option" style="background: #0000ff" data-color="#0000ff"></div>
                    <div class="color-option" style="background: #0066cc" data-color="#0066cc"></div>
                    <div class="color-option" style="background: #6b9bff" data-color="#6b9bff"></div>
                    <div class="color-option" style="background: #3366ff" data-color="#3366ff"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">녹색</div>
                    <div class="color-option" style="background: #00ff00" data-color="#00ff00"></div>
                    <div class="color-option" style="background: #00cc00" data-color="#00cc00"></div>
                    <div class="color-option" style="background: #90ee90" data-color="#90ee90"></div>
                    <div class="color-option" style="background: #33cc33" data-color="#33cc33"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">보라</div>
                    <div class="color-option" style="background: #9900ff" data-color="#9900ff"></div>
                    <div class="color-option" style="background: #6600cc" data-color="#6600cc"></div>
                    <div class="color-option" style="background: #cc99ff" data-color="#cc99ff"></div>
                    <div class="color-option" style="background: #7733ff" data-color="#7733ff"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">자주</div>
                    <div class="color-option" style="background: #cc0066" data-color="#cc0066"></div>
                    <div class="color-option" style="background: #990033" data-color="#990033"></div>
                    <div class="color-option" style="background: #ff66b2" data-color="#ff66b2"></div>
                    <div class="color-option" style="background: #e6007e" data-color="#e6007e"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">Magenta</div>
                    <div class="color-option" style="background: #ff00ff" data-color="#ff00ff"></div>
                    <div class="color-option" style="background: #ff66ff" data-color="#ff66ff"></div>
                    <div class="color-option" style="background: #ff99ff" data-color="#ff99ff"></div>
                    <div class="color-option" style="background: #ff33ff" data-color="#ff33ff"></div>
                </div>
                <div class="color-group">
                    <div class="color-group-label">Cyan</div>
                    <div class="color-option" style="background: #00ffff" data-color="#00ffff"></div>
                    <div class="color-option" style="background: #66ffff" data-color="#66ffff"></div>
                    <div class="color-option" style="background: #99ffff" data-color="#99ffff"></div>
                    <div class="color-option" style="background: #33ccff" data-color="#33ccff"></div>
                </div>
            </div>
            <button class="color-picker-close" onclick="closeColorPicker()">닫기</button>
        </div>
    </div>

    <script>
        const defaultColors = [
            '#ff0000', '#0000ff', '#9900ff', '#cc0066',
            '#00ff00', '#ff00ff', '#00ffff', '#ff6600'
        ];

        const fileData = {};
        const analysisResults = {};
        let comparisonChart = null;
        let percolationChart = null;
        let currentColorTarget = null;
        let fileCount = 0;
        let comparisonXScale = 'linear'; // 'linear' or 'logarithmic'

        // 초기화 - 더 이상 개별 업로드 박스를 만들지 않음
        function init() {
            // 초기 상태
        }

        function handleMultiFileSelect(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;
            if (files.length > 12) {
                alert('최대 12개 파일까지 선택할 수 있습니다.');
                return;
            }

            // 기존 데이터 초기화
            Object.keys(fileData).forEach(key => delete fileData[key]);
            fileCount = 0;

            const uploadGrid = document.getElementById('uploadGrid');
            uploadGrid.innerHTML = '';

            files.forEach((file, idx) => {
                const index = idx + 1;
                fileCount++;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const data = parseEISFile(text);
                    
                    if (data && data.length > 0) {
                        fileData[index] = {
                            filename: file.name,
                            data: data,
                            color: defaultColors[idx % defaultColors.length]
                        };
                        
                        // 4x2 그리드에 카드 생성
                        const card = document.createElement('div');

        function handleFileSelect(index, input) {
            const file = input.files[0];
            if (!file) return;

            reader.onload = function(e) {
                const text = e.target.result;
                const data = parseEISFile(text);
                
                if (data && data.length > 0) {

        function parseEISFile(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(/[\t,]+/);
                if (parts.length >= 3) {
                    const freq = parseFloat(parts[0]);
                    const reZ = parseFloat(parts[1]);
                    const imZ = parseFloat(parts[2]);
                    
                    if (!isNaN(freq) && !isNaN(reZ) && !isNaN(imZ)) {
                        data.push({ freq, reZ, imZ });
                    }
                }
            }
            
            return data;
        }

        // 파일명에서 농도 추출
        function extractConcentration(filename) {
            // 0d002wtP → 0.002
            // 0d005wtP → 0.005
            // 0d010wtP → 0.010 (0.01)
            // 0d030wtP → 0.030 (0.03)
            const match = filename.match(/0d(\d{3,4})wt/i);
            if (match) {
                const value = parseInt(match[1]);
                return value / 1000; // 0.002, 0.005, 0.010, 0.030
            }
            
            // 다른 형식: 0.002wt, 0.005wt 등
            const match2 = filename.match(/(\d+\.?\d*)wt/i);
            if (match2) {
                return parseFloat(match2[1]) / 100; // % → 소수
            }
            
            // 패턴을 찾지 못하면 null
            return null;
        }

        // 파일명에서 그룹명 추출 (공통 부분)
        function extractGroupName(filename) {
            // "251105_JEIO_0d002wtP_woHPH_02_PEIS_C02.txt" → "251105_JEIO"
            // "251105_OCSiAl_0d002wtP_woHPH_02_PEIS_C02.txt" → "251105_OCSiAl"
            
            // 농도 패턴 이전까지를 그룹명으로 사용
            const parts = filename.split('_');
            if (parts.length >= 2) {
                // 첫 2개 부분을 그룹명으로 (날짜_제조사)
                return parts[0] + '_' + parts[1];
            }
            
            return filename.split('.')[0]; // 확장자 제거
        }

        // 전도도 계산 (셀상수 K = 5 cm⁻¹)
        function calculateConductivity(R) {
            const K = 5; // cm⁻¹
            return K / R; // S/cm
        }

        function analyzeEISData(eisData) {
            const sortedData = [...eisData].sort((a, b) => b.freq - a.freq);
            
            let Rs = sortedData[0].reZ;
            for (let i = 0; i < Math.min(10, sortedData.length); i++) {
                if (sortedData[i].reZ < Rs) Rs = sortedData[i].reZ;
            }

            let maxImZ = 0;
            let maxImZIndex = 0;
            sortedData.forEach((d, idx) => {
                if (-d.imZ > maxImZ) {
                    maxImZ = -d.imZ;
                    maxImZIndex = idx;
                }
            });

            let R = sortedData[sortedData.length - 1].reZ;
            let rIndex = sortedData.length - 1;
            const imZThreshold = maxImZ * 0.1;
            for (let i = maxImZIndex; i < sortedData.length; i++) {
                if (-sortedData[i].imZ < imZThreshold) {
                    R = sortedData[i].reZ;
                    rIndex = i;
                    break;
                }
            }

            const semicircleData = [];
            for (let i = 0; i <= rIndex; i++) {
                if (-sortedData[i].imZ >= maxImZ * 0.3) {
                    semicircleData.push(sortedData[i]);
                }
            }
            
            const warburgData = sortedData.slice(rIndex);
            let maxWarburgReZ = R;
            warburgData.forEach(d => {
                if (d.reZ > maxWarburgReZ) maxWarburgReZ = d.reZ;
            });

            const { center, radius, alpha } = fitDepressedSemicircle(semicircleData, Rs, R);
            const warburgFit = fitWarburgLine(warburgData, R);
            const fittedSemicircle = generateDepressedSemicircleFit(center, radius, alpha, Rs, R);
            const fittedWarburg = generateWarburgFit(warburgFit, R, maxWarburgReZ);

            return {
                Rs, R,
                Rct: R - Rs,
                center, radius, alpha,
                warburgFit,
                fittedSemicircle,
                fittedWarburg,
                warburgStartFreq: sortedData[rIndex].freq
            };
        }

        function fitDepressedSemicircle(data, Rs, R) {
            if (data.length < 3) {
                return { 
                    center: { x: (Rs + R) / 2, y: 0 }, 
                    radius: (R - Rs) / 2,
                    alpha: 1.0
                };
            }

            let minReZ = Infinity;
            let maxImZ = 0;
            let maxImZReZ = 0;
            
            data.forEach(d => {
                if (d.reZ < minReZ) minReZ = d.reZ;
                if (-d.imZ > maxImZ) {
                    maxImZ = -d.imZ;
                    maxImZReZ = d.reZ;
                }
            });

            const radius = (R - minReZ) / 2;
            const centerX = (minReZ + R) / 2;
            let alpha = maxImZ / radius;
            alpha = Math.max(0.5, Math.min(1.0, alpha));
            
            let bestCenterY = 0;
            let minError = Infinity;
            
            for (let cy = -radius * 0.5; cy <= 0; cy += radius * 0.01) {
                let error = 0;
                let count = 0;
                
                data.forEach(d => {
                    const dx = d.reZ - centerX;
                    const dy = -d.imZ - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (-d.imZ > 0) {
                        error += Math.pow(dist - radius, 2);
                        count++;
                    }
                });
                
                if (count > 0) {
                    error /= count;
                    if (error < minError) {
                        minError = error;
                        bestCenterY = cy;
                    }
                }
            }

            const theoreticalMaxY = bestCenterY + Math.sqrt(Math.max(0, radius * radius - Math.pow(maxImZReZ - centerX, 2)));
            if (theoreticalMaxY > 0) {
                alpha = maxImZ / theoreticalMaxY;
                alpha = Math.max(0.5, Math.min(1.0, alpha));
            }

            return { center: { x: centerX, y: bestCenterY }, radius, alpha };
        }

        function generateDepressedSemicircleFit(center, radius, alpha, Rs, R) {
            const points = [];
            const steps = 200;
            const startX = center.x - radius;
            const endX = R;
            
            for (let i = 0; i <= steps; i++) {
                const xPos = startX + (endX - startX) * i / steps;
                const dx = xPos - center.x;
                const discriminant = radius * radius - dx * dx;
                
                if (discriminant >= 0) {
                    const baseY = center.y + Math.sqrt(discriminant);
                    const y = center.y + (baseY - center.y) * alpha;
                    
                    if (y >= 0) {
                        points.push({ x: xPos, y: y });
                    }
                }
            }
            
            return points.sort((a, b) => a.x - b.x);
        }

        function fitWarburgLine(data, R) {
            if (data.length < 2) return { slope: 1, intercept: 0 };

            const sortedByReZ = [...data].sort((a, b) => b.reZ - a.reZ);
            const warburgSubset = sortedByReZ.slice(0, Math.ceil(data.length * 0.7));
            
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            warburgSubset.forEach(d => {
                const x = d.reZ - R;
                const y = -d.imZ;
                sumX += x;
                sumY += y;
                sumXY += x * y;
                sumX2 += x * x;
            });

            const n = warburgSubset.length;
            let slope = 1.0;
            
            if (n * sumX2 - sumX * sumX !== 0) {
                slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            }
            
            return { slope, intercept: -slope * R };
        }

        function generateWarburgFit(fit, R, maxWarburgReZ) {
            const points = [];
            points.push({ x: R, y: 0 });
            
            const maxX = Math.min(maxWarburgReZ * 1.2, R * 3);
            const steps = 30;
            
            for (let i = 1; i <= steps; i++) {
                const x = R + (maxX - R) * i / steps;
                const y = fit.slope * (x - R);
                
                if (y >= 0) {
                    points.push({ x, y });
                } else {
                    break;
                }
            }
            
            return points;
        }

        function displayResults() {
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';
            resultsGrid.style.display = 'grid';

            Object.keys(analysisResults).forEach(index => {
                const analysis = analysisResults[index];
                const filename = fileData[index].filename;
                
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.borderLeftColor = fileData[index].color;
                
                let concentrationInfo = '';
                if (analysis.concentration !== null) {
                    concentrationInfo = `
                        <tr>
                            <td>CNT 농도</td>
                            <td>${(analysis.concentration * 100).toFixed(3)} wt%</td>
                        </tr>
                    `;
                }
                
                card.innerHTML = `
                    <div class="result-title">${index}. ${filename}</div>
                    <table class="result-table">
                        ${concentrationInfo}
                        <tr>
                            <td>R (총 저항)</td>
                            <td>${analysis.R.toFixed(2)} Ω</td>
                        </tr>
                        <tr>
                            <td>전도도 (κ)</td>
                            <td>${analysis.conductivity.toExponential(3)} S/cm</td>
                        </tr>
                        <tr>
                            <td>CPE 계수 (α)</td>
                            <td>${analysis.alpha.toFixed(3)}</td>
                        </tr>
                        <tr>
                            <td>Warburg 기울기</td>
                            <td>${analysis.warburgFit.slope.toFixed(3)}</td>
                        </tr>
                    </table>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function updateComparisonControls() {
            const controls = document.getElementById('comparisonControls');
            controls.innerHTML = '';

            Object.keys(fileData).forEach(index => {
                const selector = document.createElement('div');
                selector.className = 'data-selector';
                selector.innerHTML = `
                    <input type="checkbox" id="check-${index}" onchange="updateComparison()">
                    <label for="check-${index}">${index}. ${fileData[index].filename}</label>
                    <div class="data-options">
                        <button class="option-btn active" id="data-btn-${index}" onclick="toggleOption(${index}, 'data')">실험 데이터</button>
                        <button class="option-btn active" id="fitting-btn-${index}" onclick="toggleOption(${index}, 'fitting')">Fitting</button>
                    </div>
                `;
                controls.appendChild(selector);
            });
        }

        function toggleOption(index, type) {
            const btn = document.getElementById(`${type}-btn-${index}`);
            btn.classList.toggle('active');
            updateComparison();
        }

        function updateComparison() {
            const datasets = [];

            Object.keys(fileData).forEach(index => {
                const checked = document.getElementById(`check-${index}`)?.checked;
                if (!checked) return;

                const showData = document.getElementById(`data-btn-${index}`)?.classList.contains('active');
                const showFitting = document.getElementById(`fitting-btn-${index}`)?.classList.contains('active');
                const color = document.getElementById(`color-${index}`).style.background;
                const filename = fileData[index].filename;

                if (showData) {
                    const dataPoints = fileData[index].data.map(d => ({ x: d.reZ, y: -d.imZ }));
                    datasets.push({
                        label: `${index}. ${filename} (데이터)`,
                        data: dataPoints,
                        borderColor: color,
                        backgroundColor: color,
                        pointRadius: 3,
                        showLine: false
                    });
                }

                if (showFitting && analysisResults[index]) {
                    const fittingData = [
                        ...analysisResults[index].fittedSemicircle,
                        ...analysisResults[index].fittedWarburg
                    ];
                    datasets.push({
                        label: `${index}. ${filename} (Fitting)`,
                        data: fittingData,
                        borderColor: color,
                        backgroundColor: 'transparent',
                        pointRadius: 0,
                        borderWidth: 2.5,
                        showLine: true,
                        tension: 0
                    });
                }
            });

            plotComparison(datasets);
        }

        function plotComparison(datasets) {
            const ctx = document.getElementById('comparisonChart').getContext('2d');

            if (comparisonChart) {
                comparisonChart.destroy();
            }

            comparisonChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { font: { size: 10 }, boxWidth: 12 }
                        },
                        zoom: {
                            zoom: {
                                wheel: { enabled: true, speed: 0.1 },
                                pinch: { enabled: true },
                                mode: 'xy'
                            },
                            pan: {
                                enabled: true,
                                mode: 'xy'
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: comparisonXScale,
                            title: { display: true, text: 'Re(Z) [Ω]', font: { size: 14, weight: 'bold' } },
                            ticks: { font: { size: 11 } }
                        },
                        y: {
                            type: 'linear',
                            title: { display: true, text: '-Im(Z) [Ω]', font: { size: 14, weight: 'bold' } },
                            ticks: { font: { size: 11 } },
                            min: 0
                        }
                    }
                }
            });
        }

        function resetComparisonZoom() {
            if (comparisonChart) {
                comparisonChart.resetZoom();
            }
        }

        function changeComparisonScale() {
            const scale = document.getElementById('xScaleSelect').value;
            comparisonXScale = scale;
            updateComparison();
        }

        function captureComparison() {
            // Nyquist Plot만 캡쳐 (첫 번째 chart-container)
            const container = document.querySelectorAll('.chart-container')[0];
            html2canvas(container, {
                backgroundColor: '#ffffff',
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Nyquist_Plot.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // 페이지 로드 시 실행할 내용 없음 (다중 파일 선택으로 변경됨)
        window.onload = function() {
            console.log('Nyquist Plot Analyzer 준비 완료');
        };

        // 프로젝트 저장/불러오기 기능
        async function saveProject() {
            if (Object.keys(fileData).length === 0) {
                alert('저장할 데이터가 없습니다. 먼저 파일을 업로드하세요.');
                return;
            }
            
            try {
                // 프로젝트 데이터 구조
                const projectData = {
                    version: '1.0',
                    timestamp: new Date().toISOString(),
                    type: 'EIS-Percolation',
                    fileData: Object.keys(fileData).reduce((acc, key) => {
                        acc[key] = {
                            filename: fileData[key].filename,
                            data: fileData[key].data,
                            color: fileData[key].color
                        };
                        return acc;
                    }, {}),
                    analysisResults: analysisResults,
                    fileCount: fileCount
                };
                
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                const fileName = `eis_project_${timestamp}.json`;
                const jsonString = JSON.stringify(projectData, null, 2);
                
                // File System Access API 지원 확인
                if ('showSaveFilePicker' in window) {
                    try {
                        const opts = {
                            suggestedName: fileName,
                            types: [{
                                description: 'JSON Files',
                                accept: {'application/json': ['.json']},
                            }],
                        };
                        
                        const handle = await window.showSaveFilePicker(opts);
                        const writable = await handle.createWritable();
                        await writable.write(jsonString);
                        await writable.close();
                        
                        alert(`프로젝트 저장 완료! (${Object.keys(fileData).length}개 파일)`);
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            throw err;
                        }
                    }
                } else {
                    // 폴백: 기존 다운로드 방식
                    const blob = new Blob([jsonString], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    link.click();
                    URL.revokeObjectURL(url);
                    alert(`프로젝트 저장 완료! (${Object.keys(fileData).length}개 파일)`);
                }
                
            } catch (error) {
                console.error('Save project error:', error);
                alert('프로젝트 저장 실패: ' + error.message);
            }
        }

        function loadProject(event) {
            const file = event.target.files[0];
            
            if (!file) return;
            
            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    const projectData = JSON.parse(e.target.result);
                    
                    // 버전 및 타입 확인
                    if (!projectData.version || !projectData.fileData) {
                        throw new Error('유효하지 않은 프로젝트 파일입니다');
                    }
                    
                    if (projectData.type !== 'EIS-Percolation') {
                        throw new Error('이 파일은 EIS-Percolation 분석기 프로젝트가 아닙니다');
                    }
                    
                    // 기존 데이터와 병합 (누적 모드)
                    const existingKeys = Object.keys(fileData);
                    const maxExistingKey = existingKeys.length > 0 ? Math.max(...existingKeys.map(k => parseInt(k))) : 0;
                    let newFileCount = 0;
                    
                    // 새 데이터 추가
                    Object.keys(projectData.fileData).forEach(oldKey => {
                        const newKey = maxExistingKey + parseInt(oldKey);
                        fileData[newKey] = {
                            filename: projectData.fileData[oldKey].filename,
                            data: projectData.fileData[oldKey].data,
                            color: projectData.fileData[oldKey].color
                        };
                        newFileCount++;
                    });
                    
                    fileCount = maxExistingKey + projectData.fileCount;
                    
                    // UI 업데이트
                    const uploadGrid = document.getElementById('uploadGrid');
                    
                    // 기존 카드에 새 카드 추가
                    Object.keys(projectData.fileData).forEach((oldKey, idx) => {
                        const newKey = maxExistingKey + parseInt(oldKey);
                        const data = projectData.fileData[oldKey];
                        
                        const card = document.createElement('div');
                        card.className = 'upload-item loaded';
                        card.id = `upload-item-${newKey}`;
                        card.innerHTML = `
                            <div class="upload-number">${newKey}</div>
                            <div class="color-indicator" id="color-${newKey}" style="background: ${data.color}" onclick="openColorPicker(${newKey})"></div>
                            <div style="flex: 1; overflow: hidden;">
                                <div style="font-weight: 600; font-size: 13px;">✓ ${data.filename}</div>
                                <div style="font-size: 11px; margin-top: 3px; opacity: 0.8;">${data.data.length} points</div>
                            </div>
                        `;
                        uploadGrid.appendChild(card);
                    });
                    
                    // 분석 버튼 활성화
                    document.getElementById('analyzeBtn').disabled = false;
                    
                    alert(`프로젝트 불러오기 완료! (${newFileCount}개 새 파일, 총 ${Object.keys(fileData).length}개) - "분석 시작" 버튼을 클릭하세요.`);
                    
                    console.log(`Loaded project with ${newFileCount} new files, total ${Object.keys(fileData).length}`);
                    
                } catch (error) {
                    console.error('Load project error:', error);
                    alert('프로젝트 불러오기 실패: ' + error.message);
                }
            };
            
            reader.onerror = () => {
                alert('파일 읽기 실패');
            };
            
            reader.readAsText(file);
            
            // Reset file input
            event.target.value = '';
        }
    </script>
</body>
</html>
