<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholar Flow — 논문 검색 & 분석</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111722;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --yellow: #f5c842;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Config Panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '//';
    color: var(--muted);
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  input[type="password"] { letter-spacing: 0.1em; }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  select option { background: var(--surface); }

  /* Search Panel */
  .search-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input-wrap input {
    padding-left: 40px;
    font-size: 14px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary:hover { background: #00b8d9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-secondary:hover { background: rgba(0,212,255,0.08); }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-purple {
    background: var(--accent2);
    color: white;
  }

  .btn-purple:hover { background: #6d28d9; transform: translateY(-1px); }
  .btn-purple:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-yellow {
    background: var(--yellow);
    color: var(--bg);
  }

  .btn-yellow:hover { background: #e6b800; }

  /* Query chips */
  .query-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    min-height: 32px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }

  .chip-remove {
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
  }

  /* Filter row */
  .filter-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .filter-row select { width: auto; min-width: 120px; }
  .filter-row input[type="number"] { width: 80px; }

  /* Log */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-height: 40px;
    max-height: 100px;
    overflow-y: auto;
    margin-top: 16px;
  }

  .log-line { line-height: 1.8; }
  .log-line.info { color: var(--accent); }
  .log-line.success { color: var(--green); }
  .log-line.warn { color: var(--yellow); }
  .log-line.error { color: var(--red); }

  /* Results */
  .results-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    display: none;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .results-count span {
    color: var(--accent);
    font-weight: 600;
  }

  .action-row {
    display: flex;
    gap: 8px;
  }

  /* Paper card */
  .paper-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    position: relative;
  }

  .paper-card:hover { border-color: rgba(0,212,255,0.3); }
  .paper-card.selected { border-color: var(--accent); background: rgba(0,212,255,0.03); }

  .paper-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .paper-checkbox {
    margin-top: 3px;
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .paper-meta {
    flex: 1;
    min-width: 0;
  }

  .paper-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 6px;
    cursor: pointer;
  }

  .paper-title:hover { color: var(--accent); }

  .paper-info {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 8px;
  }

  .paper-info span { display: flex; align-items: center; gap: 4px; }

  .badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
  }

  .badge-high { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-mid { background: rgba(245,200,66,0.15); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }
  .badge-low { background: rgba(100,116,139,0.15); color: var(--muted); border: 1px solid rgba(100,116,139,0.3); }

  .paper-abstract {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .paper-summary {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.6;
    margin-top: 8px;
    padding: 10px 12px;
    background: rgba(124,58,237,0.08);
    border-left: 2px solid var(--accent2);
    border-radius: 0 4px 4px 0;
    display: none;
  }

  .paper-summary .summary-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent2);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .paper-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-sm {
    padding: 4px 10px;
    font-size: 10px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .config-grid { grid-template-columns: 1fr; }
    .filter-row { flex-wrap: wrap; }
    .action-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🔬</div>
        <div>
          <div class="logo-text">SCHOLAR_FLOW</div>
          <div class="logo-sub">논문 검색 & 분석 시스템 v1.0</div>
        </div>
      </div>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>SEMANTIC_SCHOLAR + CLAUDE_API</span>
      </div>
    </div>
  </header>

  <!-- Config Panel -->
  <div class="config-panel">
    <div class="panel-title">API 설정</div>
    <div class="config-grid">
      <div class="field-group">
        <label>CLAUDE_API_KEY</label>
        <input type="password" id="claudeKey" placeholder="sk-ant-..." />
      </div>
      <div class="field-group">
        <label>N8N_WEBHOOK_URL (Zotero 저장용)</label>
        <input type="text" id="n8nWebhook" placeholder="https://your-n8n.cloud/webhook/..." />
      </div>
      <div class="field-group">
        <label>ZOTERO 컬렉션 이름 <span style="color:var(--muted); font-weight:300;">(비워두면 My Library에 저장)</span></label>
        <input type="text" id="zoteroCollection" placeholder="예: CNT_배터리_2024, 리튬이온_전극..." />
      </div>
    </div>
  </div>

  <!-- Search Panel -->
  <div class="search-panel">
    <div class="panel-title">검색 설정</div>

    <div class="search-row">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput"
          placeholder="검색 주제 입력 (예: CNT 분산, 리튬이온 배터리 전극...)"
          onkeydown="if(event.key==='Enter') generateQueries()" />
      </div>
      <button class="btn btn-secondary" onclick="generateQueries()" id="genBtn">검색식 생성</button>
    </div>

    <!-- Query chips -->
    <div>
      <label style="display:block; margin-bottom:8px;">생성된 검색식 (클릭하여 선택/해제)</label>
      <div class="query-chips" id="queryChips">
        <span style="font-size:12px; color:var(--muted); font-family:var(--mono);">검색식을 생성하면 여기에 표시됩니다</span>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <div class="field-group">
        <label>최소 인용수</label>
        <input type="number" id="minCitations" value="10" min="0" />
      </div>
      <div class="field-group">
        <label>최소 연도</label>
        <input type="number" id="minYear" value="2018" min="1990" max="2025" />
      </div>
      <div class="field-group">
        <label>논문 수 (쿼리당)</label>
        <select id="paperLimit">
          <option value="5">5개</option>
          <option value="10" selected>10개</option>
          <option value="20">20개</option>
        </select>
      </div>
      <div class="field-group">
        <label>정렬</label>
        <select id="sortBy">
          <option value="citationCount">인용수</option>
          <option value="year">최신순</option>
          <option value="relevance">관련도</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="searchPapers()" id="searchBtn" style="align-self:flex-end;">
        논문 검색
      </button>
    </div>

    <div class="log-box" id="logBox">
      <div class="log-line">// 검색 주제를 입력하고 검색식을 생성하세요</div>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="results-panel" id="resultsPanel">
    <div class="results-header">
      <div>
        <div class="panel-title">검색 결과</div>
        <div class="results-count" id="resultsCount">논문 <span>0</span>편 검색됨</div>
      </div>
      <div class="action-row">
        <button class="btn btn-secondary btn-sm" onclick="selectAll()">전체 선택</button>
        <button class="btn btn-purple btn-sm" onclick="summarizeSelected()" id="summarizeBtn">
          선택 요약
        </button>
        <button class="btn btn-purple btn-sm" onclick="saveToZotero()" id="zoteroBtn">
          Zotero 저장
        </button>
        <button class="btn btn-yellow btn-sm" onclick="exportCSV()">CSV 내보내기</button>
      </div>
    </div>

    <div id="paperList"></div>

    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">총 논문</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statHigh">0</div>
        <div class="stat-label">High 관련도</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statSelected">0</div>
        <div class="stat-label">선택됨</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statSummarized">0</div>
        <div class="stat-label">요약 완료</div>
      </div>
    </div>
  </div>
</div>

<script>
  let papers = [];
  let queries = [];

  // ── 로그 ──────────────────────────────────────────
  function log(msg, type='info') {
    const box = document.getElementById('logBox');
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    line.textContent = `[${time}] ${msg}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  // ── 검색식 생성 ──────────────────────────────────
  async function generateQueries() {
    const keyword = document.getElementById('searchInput').value.trim();
    const apiKey = document.getElementById('claudeKey').value.trim();

    if (!keyword) { alert('검색 주제를 입력하세요'); return; }
    if (!apiKey) { alert('Claude API Key를 입력하세요'); return; }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>생성 중...';
    log(`검색식 생성 중: "${keyword}"`, 'info');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `You are a Semantic Scholar search expert.

Topic (may be Korean or English): "${keyword}"

Generate exactly 5 English search queries for Semantic Scholar API.

CRITICAL RULES:
1. Each query MUST be 2-4 words only (Semantic Scholar works best with short queries)
2. Use only English academic terms
3. NO long phrases or sentences
4. Mix broad and specific angles
5. If the topic is in Korean, translate to precise English academic terms

GOOD examples: "CNT electrode dispersion", "carbon nanotube binder", "MWCNT slurry rheology"
BAD examples: "multi-walled carbon nanotube dispersant binder battery electrode composite" (too long, will return 0 results)

Return ONLY a JSON array, no other text:
["query1", "query2", "query3", "query4", "query5"]`
          }]
        })
      });

      const data = await response.json();
      
      // API 에러 체크
      if (data.error) {
        throw new Error(`API 에러: ${data.error.type} - ${data.error.message}`);
      }
      if (!data.content || !data.content[0]) {
        throw new Error(`응답 형식 오류: ${JSON.stringify(data).slice(0, 200)}`);
      }
      
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, '').trim();
      queries = JSON.parse(clean);

      renderQueryChips();
      log(`검색식 ${queries.length}개 생성 완료`, 'success');
    } catch (e) {
      log(`검색식 생성 실패: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '검색식 생성';
    }
  }

  function renderQueryChips() {
    const container = document.getElementById('queryChips');
    container.innerHTML = '';
    queries.forEach((q, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip active';
      chip.dataset.index = i;
      chip.innerHTML = `<span>${q}</span><span class="chip-remove" onclick="removeChip(${i})">✕</span>`;
      chip.addEventListener('click', (e) => {
        if (!e.target.classList.contains('chip-remove')) {
          chip.classList.toggle('active');
        }
      });
      container.appendChild(chip);
    });
  }

  function removeChip(i) {
    queries.splice(i, 1);
    renderQueryChips();
  }

  // ── 논문 검색 ─────────────────────────────────────
  async function searchPapers() {
    const activeChips = [...document.querySelectorAll('.chip.active')];
    if (activeChips.length === 0) { alert('검색식을 선택하세요'); return; }

    const minCit = parseInt(document.getElementById('minCitations').value) || 0;
    const minYear = parseInt(document.getElementById('minYear').value) || 2018;
    const limit = parseInt(document.getElementById('paperLimit').value) || 10;
    const sortBy = document.getElementById('sortBy').value;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>검색 중...';
    papers = [];

    const activeQueries = activeChips.map(c => queries[c.dataset.index]).filter(Boolean);

    for (const q of activeQueries) {
      log(`검색 중: "${q}"`, 'info');
      try {
        // Semantic Scholar 검색 (연도 필터 포함)
        const yearFilter = `&year=${minYear}-`;
        const url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(q)}&limit=${limit}&fields=title,authors,year,citationCount,abstract,externalIds,url${yearFilter}&sort=${sortBy === 'citationCount' ? 'citationCount' : sortBy === 'year' ? 'publicationDate' : 'relevance'}`;
        const res = await fetch(url);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.data && data.data.length > 0) {
          const filtered = data.data.filter(p =>
            (p.citationCount || 0) >= minCit &&
            (p.year || 0) >= minYear &&
            p.abstract
          );
          papers.push(...filtered);
          log(`"${q}" → ${filtered.length}편 수집`, 'success');
        } else {
          // Fallback: 쿼리가 너무 길면 앞 3단어만으로 재시도
          const words = q.split(/\s+/);
          if (words.length > 3) {
            const shortQ = words.slice(0, 3).join(' ');
            log(`"${q}" 결과 없음 → "${shortQ}"로 재시도`, 'warn');
            const retryUrl = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(shortQ)}&limit=${limit}&fields=title,authors,year,citationCount,abstract,externalIds,url${yearFilter}&sort=${sortBy === 'citationCount' ? 'citationCount' : sortBy === 'year' ? 'publicationDate' : 'relevance'}`;
            const retryRes = await fetch(retryUrl);
            if (retryRes.ok) {
              const retryData = await retryRes.json();
              if (retryData.data) {
                const filtered = retryData.data.filter(p =>
                  (p.citationCount || 0) >= minCit &&
                  (p.year || 0) >= minYear &&
                  p.abstract
                );
                papers.push(...filtered);
                log(`"${shortQ}" → ${filtered.length}편 수집 (fallback)`, 'success');
              }
            }
          } else {
            log(`"${q}" 검색 결과: 0편`, 'warn');
          }
        }
      } catch (e) {
        log(`"${q}" 검색 실패: ${e.message}`, 'error');
      }
      // API rate limit 방지 (1초 간격)
      await new Promise(r => setTimeout(r, 1000));
    }

    // 중복 제거
    const seen = new Set();
    papers = papers.filter(p => {
      if (seen.has(p.paperId)) return false;
      seen.add(p.paperId);
      return true;
    });

    // 인용수 정렬
    papers.sort((a, b) => (b.citationCount || 0) - (a.citationCount || 0));

    log(`총 ${papers.length}편 수집 완료 (중복 제거)`, 'success');
    renderResults();

    btn.disabled = false;
    btn.textContent = '논문 검색';
  }

  // ── 결과 렌더링 ───────────────────────────────────
  function renderResults() {
    const panel = document.getElementById('resultsPanel');
    const list = document.getElementById('paperList');
    const countEl = document.getElementById('resultsCount');

    panel.style.display = 'block';
    countEl.innerHTML = `논문 <span>${papers.length}</span>편 검색됨`;
    list.innerHTML = '';

    papers.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'paper-card';
      card.id = `paper-${i}`;

      const doi = p.externalIds?.DOI || '';
      const doiLink = doi ? `https://doi.org/${doi}` : (p.url || '#');

      card.innerHTML = `
        <div class="paper-header">
          <input type="checkbox" class="paper-checkbox" id="cb-${i}"
            onchange="updateStats(); document.getElementById('paper-${i}').classList.toggle('selected', this.checked)">
          <div class="paper-meta">
            <div class="paper-title" onclick="toggleAbstract(${i})">${p.title || '제목 없음'}</div>
            <div class="paper-info">
              <span>👤 ${(p.authors||[]).slice(0,3).map(a=>a.name).join(', ')}${(p.authors||[]).length > 3 ? ' 외' : ''}</span>
              <span>📅 ${p.year || '-'}</span>
              <span>📊 인용 ${p.citationCount || 0}</span>
              ${doi ? `<span>🔗 <a href="${doiLink}" target="_blank" style="color:var(--accent); text-decoration:none;">DOI</a></span>` : ''}
            </div>
            <div class="paper-actions">
              <span class="badge badge-mid" id="badge-${i}">관련도 미평가</span>
              <button class="btn btn-secondary btn-sm" onclick="toggleAbstract(${i})">초록 보기</button>
              <button class="btn btn-purple btn-sm" onclick="summarizeSingle(${i})">요약</button>
            </div>
          </div>
        </div>
        <div class="paper-abstract" id="abstract-${i}">${p.abstract || '초록 없음'}</div>
        <div class="paper-summary" id="summary-${i}">
          <div class="summary-label">// CLAUDE SUMMARY</div>
          <div id="summary-text-${i}"></div>
        </div>
      `;
      list.appendChild(card);
    });

    document.getElementById('statsBar').style.display = 'flex';
    updateStats();
  }

  function toggleAbstract(i) {
    const el = document.getElementById(`abstract-${i}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  function selectAll() {
    const checkboxes = document.querySelectorAll('.paper-checkbox');
    const allChecked = [...checkboxes].every(c => c.checked);
    checkboxes.forEach(c => {
      c.checked = !allChecked;
      const card = c.closest('.paper-card');
      if (card) card.classList.toggle('selected', c.checked);
    });
    updateStats();
  }

  function updateStats() {
    const total = papers.length;
    const selected = [...document.querySelectorAll('.paper-checkbox:checked')].length;
    const high = [...document.querySelectorAll('.badge-high')].length;
    const summarized = [...document.querySelectorAll('[id^="summary-"]')]
      .filter(el => el.style.display === 'block').length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statSelected').textContent = selected;
    document.getElementById('statHigh').textContent = high;
    document.getElementById('statSummarized').textContent = summarized;
  }

  // ── 단일 요약 ─────────────────────────────────────
  async function summarizeSingle(i) {
    const apiKey = document.getElementById('claudeKey').value.trim();
    if (!apiKey) { alert('Claude API Key를 입력하세요'); return; }

    const p = papers[i];
    const summaryEl = document.getElementById(`summary-${i}`);
    const summaryText = document.getElementById(`summary-text-${i}`);
    const badge = document.getElementById(`badge-${i}`);

    summaryText.innerHTML = '<span class="spinner"></span>요약 중...';
    summaryEl.style.display = 'block';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `다음 논문을 한국어로 분석하세요.

제목: ${p.title}
초록: ${p.abstract}

다음 JSON 형식으로만 답변하세요:
{
  "summary": "핵심 내용 2-3문장",
  "keyFindings": "주요 발견 1-2문장",
  "relevance": "High 또는 Mid 또는 Low",
  "relevanceReason": "CNT 배터리 연구와의 관련성 한 문장",
  "keywords": ["키워드1", "키워드2", "키워드3"]
}`
          }]
        })
      });

      const data = await res.json();
      
      if (data.error) {
        throw new Error(`API: ${data.error.type} - ${data.error.message}`);
      }
      if (!data.content || !data.content[0]) {
        throw new Error(`응답 오류: ${JSON.stringify(data).slice(0, 200)}`);
      }
      
      const text = data.content[0].text.trim().replace(/```json|```/g, '');
      const result = JSON.parse(text);

      summaryText.innerHTML = `
        <div style="margin-bottom:6px;">${result.summary}</div>
        <div style="color:var(--accent); margin-bottom:4px; font-size:11px;">▸ ${result.keyFindings}</div>
        <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
          ${result.keywords.map(k => `<span style="background:rgba(0,212,255,0.1); color:var(--accent); padding:1px 7px; border-radius:10px; font-size:10px; font-family:var(--mono);">${k}</span>`).join('')}
        </div>
        <div style="margin-top:6px; font-size:11px; color:var(--muted);">관련성: ${result.relevanceReason}</div>
      `;

      // Badge 업데이트
      badge.className = `badge badge-${result.relevance.toLowerCase()}`;
      badge.textContent = `${result.relevance} 관련도`;

      // papers 배열에 저장
      papers[i]._summary = result;
      updateStats();
      log(`"${p.title.slice(0,40)}..." 요약 완료 → ${result.relevance}`, 'success');

    } catch (e) {
      summaryText.textContent = `요약 실패: ${e.message}`;
      log(`요약 실패: ${e.message}`, 'error');
    }
  }

  // ── 선택 요약 ─────────────────────────────────────
  async function summarizeSelected() {
    const selected = [...document.querySelectorAll('.paper-checkbox:checked')];
    if (selected.length === 0) { alert('논문을 선택하세요'); return; }

    log(`선택된 ${selected.length}편 요약 시작`, 'info');
    for (const cb of selected) {
      const i = parseInt(cb.id.replace('cb-', ''));
      await summarizeSingle(i);
      await new Promise(r => setTimeout(r, 500));
    }
    log('선택 요약 완료', 'success');
  }

  // ── Zotero 저장 (n8n webhook) ─────────────────────
  async function saveToZotero() {
    const webhook = document.getElementById('n8nWebhook').value.trim();
    if (!webhook) { alert('n8n Webhook URL을 입력하세요'); return; }

    const selected = [...document.querySelectorAll('.paper-checkbox:checked')];
    if (selected.length === 0) { alert('저장할 논문을 선택하세요'); return; }

    const collectionName = document.getElementById('zoteroCollection').value.trim();

    const btn = document.getElementById('zoteroBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>저장 중...';

    const toSave = selected.map(cb => {
      const i = parseInt(cb.id.replace('cb-', ''));
      const p = papers[i];
      return {
        title: p.title,
        authors: (p.authors||[]).map(a => a.name),
        year: p.year,
        doi: p.externalIds?.DOI || '',
        url: p.url || '',
        abstract: p.abstract || '',
        citationCount: p.citationCount || 0,
        summary: p._summary?.summary || '',
        relevance: p._summary?.relevance || 'Mid',
        keywords: p._summary?.keywords || []
      };
    });

    try {
      const res = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          papers: toSave,
          collectionName: collectionName || '',
          timestamp: new Date().toISOString()
        })
      });

      if (res.ok) {
        log(`${toSave.length}편 Zotero 저장 요청 완료`, 'success');
        alert(`${toSave.length}편이 Zotero에 저장 요청됐습니다.`);
      } else {
        throw new Error(`HTTP ${res.status}`);
      }
    } catch (e) {
      log(`Zotero 저장 실패: ${e.message}`, 'error');
      alert(`저장 실패: ${e.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Zotero 저장';
    }
  }

  // ── CSV 내보내기 ──────────────────────────────────
  function exportCSV() {
    if (papers.length === 0) { alert('검색 결과가 없습니다'); return; }

    const headers = ['제목','저자','연도','인용수','DOI','관련도','요약','핵심발견','키워드','검색일'];
    const rows = papers.map(p => [
      `"${(p.title||'').replace(/"/g,'""')}"`,
      `"${(p.authors||[]).map(a=>a.name).join('; ').replace(/"/g,'""')}"`,
      p.year || '',
      p.citationCount || 0,
      p.externalIds?.DOI || '',
      p._summary?.relevance || '',
      `"${(p._summary?.summary||'').replace(/"/g,'""')}"`,
      `"${(p._summary?.keyFindings||'').replace(/"/g,'""')}"`,
      `"${(p._summary?.keywords||[]).join(', ')}"`,
      new Date().toLocaleDateString('ko-KR')
    ]);

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `scholar_flow_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    log(`CSV 내보내기 완료 (${papers.length}편)`, 'success');
  }
</script>
